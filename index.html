<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>디지몬 그림 맞추기</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f6f1;
      --panel: #ffffff;
      --ink: #18191f;
      --muted: #6c717c;
      --line: #d8d5ca;
      --accent: #e24a3b;
      --accent-soft: #ffe7e1;
      --sky: #2477a8;
      --green: #1f8f67;
      --shadow: 0 16px 38px rgba(36, 39, 45, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(226, 74, 59, 0.08), transparent 30%),
        linear-gradient(315deg, rgba(36, 119, 168, 0.11), transparent 34%),
        var(--bg);
    }

    .app {
      width: min(1180px, calc(100vw - 32px));
      height: 100vh;
      margin: 0 auto;
      padding: clamp(10px, 1.6vh, 18px) 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex: 0 0 auto;
      margin-bottom: clamp(8px, 1.2vh, 12px);
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 2.4vw, 30px);
      font-weight: 800;
      letter-spacing: 0;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-button {
      width: 34px;
      min-width: 34px;
      padding: 0;
      border-radius: 999px;
      font-size: 16px;
      line-height: 1;
    }

    .pill {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 11px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill strong {
      color: var(--ink);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(260px, 27vw, 320px);
      gap: 12px;
      align-items: stretch;
      flex: 1 1 auto;
      min-height: 0;
    }

    .board-wrap,
    .palette-wrap {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .board-toolbar,
    .palette-head {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex: 0 0 auto;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
    }

    .selected-label {
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }

    .selected-label strong {
      color: var(--accent);
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--sky);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .danger {
      color: var(--accent);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-template-rows: repeat(6, minmax(0, 1fr));
      gap: 6px;
      flex: 1 1 auto;
      min-height: 0;
      padding: 8px;
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
      border: 2px solid #cfcabd;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(36, 119, 168, 0.08), rgba(31, 143, 103, 0.08)),
        #fbfaf6;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
    }

    .cell:hover {
      transform: translateY(-1px);
      border-color: var(--sky);
    }

    .cell.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .cell.matched {
      border-width: 3px;
      border-color: #fff;
      box-shadow:
        0 0 0 4px #ff4d4d,
        0 0 18px rgba(255, 77, 77, 0.58),
        0 0 32px rgba(36, 119, 168, 0.42);
      animation: matchedRainbow 1.8s linear infinite, matchedPulse 900ms ease-in-out infinite alternate;
    }

    .cell.matched::after {
      content: "";
      position: absolute;
      inset: 2px;
      z-index: 2;
      border-radius: 6px;
      pointer-events: none;
      background:
        linear-gradient(90deg, #ff4d4d, #ffbf3f, #43d17b, #35a7ff, #9b5cff, #ff4d4d) top / 100% 4px no-repeat,
        linear-gradient(90deg, #35a7ff, #9b5cff, #ff4d4d, #ffbf3f, #43d17b, #35a7ff) bottom / 100% 4px no-repeat,
        linear-gradient(180deg, #43d17b, #35a7ff, #9b5cff, #ff4d4d, #ffbf3f, #43d17b) left / 4px 100% no-repeat,
        linear-gradient(180deg, #ffbf3f, #43d17b, #35a7ff, #9b5cff, #ff4d4d, #ffbf3f) right / 4px 100% no-repeat;
      animation: matchedHue 1.2s linear infinite;
    }

    .cell.matched .coord {
      z-index: 3;
      color: var(--ink);
    }

    @keyframes matchedRainbow {
      0% {
        box-shadow:
          0 0 0 3px #ff4d4d,
          0 0 15px rgba(255, 77, 77, 0.52),
          0 0 26px rgba(255, 77, 77, 0.38);
      }

      20% {
        box-shadow:
          0 0 0 3px #ffbf3f,
          0 0 15px rgba(255, 191, 63, 0.52),
          0 0 26px rgba(255, 191, 63, 0.38);
      }

      40% {
        box-shadow:
          0 0 0 3px #43d17b,
          0 0 15px rgba(67, 209, 123, 0.52),
          0 0 26px rgba(67, 209, 123, 0.38);
      }

      60% {
        box-shadow:
          0 0 0 3px #35a7ff,
          0 0 15px rgba(53, 167, 255, 0.52),
          0 0 26px rgba(53, 167, 255, 0.38);
      }

      80% {
        box-shadow:
          0 0 0 3px #9b5cff,
          0 0 15px rgba(155, 92, 255, 0.52),
          0 0 26px rgba(155, 92, 255, 0.38);
      }

      100% {
        box-shadow:
          0 0 0 3px #ff4d4d,
          0 0 15px rgba(255, 77, 77, 0.52),
          0 0 26px rgba(255, 77, 77, 0.38);
      }
    }

    @keyframes matchedHue {
      to {
        filter: hue-rotate(360deg);
      }
    }

    @keyframes matchedPulse {
      from {
        transform: translateY(0) scale(1);
      }

      to {
        transform: translateY(-1px) scale(1.01);
      }
    }

    .coord {
      position: absolute;
      top: 6px;
      left: 7px;
      z-index: 1;
      min-width: 30px;
      border-radius: 999px;
      padding: 3px 7px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .empty-mark {
      color: #a39f95;
      font-size: 22px;
      font-weight: 900;
    }

    .palette-title {
      margin: 0;
      font-size: 17px;
      font-weight: 900;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(6, minmax(0, 1fr));
      gap: 6px;
      flex: 1 1 auto;
      min-height: 0;
      padding: 8px;
      overflow: hidden;
    }

    .digimon {
      display: grid;
      grid-template-rows: minmax(0, 1fr) 28px;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      text-align: left;
      transition: transform 120ms ease, border-color 120ms ease;
    }

    .digimon:hover {
      transform: translateY(-1px);
      border-color: var(--sky);
    }

    .digimon.disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }

    .digimon.complete {
      border-color: var(--green);
    }

    .digimon img {
      width: 100%;
      height: 100%;
      min-height: 0;
      object-fit: contain;
      display: block;
      background: #eee;
    }

    .digimon-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-width: 0;
      padding: 5px 7px;
    }

    .name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 900;
    }

    .count {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 2px 7px;
      background: #f0eee7;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .complete .count {
      background: rgba(31, 143, 103, 0.12);
      color: var(--green);
    }

    .site-footer {
      flex: 0 0 auto;
      margin-top: 8px;
      padding: 5px 4px 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      text-align: center;
    }

    .visit-line {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      font-weight: 800;
    }

    .site-footer strong {
      color: var(--ink);
    }

    .source-line a {
      color: var(--sky);
      font-weight: 800;
      text-decoration: none;
    }

    .source-line a:hover {
      text-decoration: underline;
    }

    .guide-backdrop {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(24, 25, 31, 0.38);
    }

    .guide-backdrop[hidden] {
      display: none;
    }

    .guide-panel {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(24, 25, 31, 0.28);
    }

    .guide-panel h2 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .guide-panel p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .guide-panel strong {
      color: var(--ink);
    }

    .guide-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }

    @media (max-width: 900px) {
      .workspace {
        grid-template-columns: minmax(0, 1fr) minmax(210px, 30vw);
        gap: 8px;
      }

      .palette {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100vw - 10px, 1180px);
        padding: 6px 0;
      }

      header {
        gap: 6px;
        margin-bottom: 6px;
      }

      h1 {
        font-size: clamp(16px, 5vw, 20px);
      }

      .pill {
        min-height: 26px;
        padding: 4px 7px;
        font-size: 11px;
      }

      .icon-button {
        width: 28px;
        min-width: 28px;
        font-size: 13px;
      }

      .workspace {
        grid-template-columns: minmax(0, 1fr) minmax(118px, 33vw);
        gap: 5px;
      }

      .board-toolbar,
      .palette-head {
        min-height: 34px;
        padding: 5px 6px;
      }

      .selected-label,
      .palette-title {
        font-size: 12px;
      }

      .stats,
      .actions {
        justify-content: flex-end;
      }

      button {
        min-height: 26px;
        border-radius: 6px;
        padding: 0 7px;
        font-size: 11px;
      }

      .board {
        gap: 4px;
        padding: 5px;
      }

      .coord {
        top: 4px;
        left: 4px;
        min-width: 25px;
        padding: 2px 5px;
        font-size: 10px;
      }

      .empty-mark {
        font-size: 16px;
      }

      .palette {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 4px;
        padding: 5px;
      }

      .digimon {
        grid-template-rows: minmax(0, 1fr) 22px;
      }

      .digimon-info {
        padding: 3px 4px;
      }

      .name,
      .count {
        font-size: 10px;
      }

      .site-footer {
        margin-top: 4px;
        font-size: 10px;
        line-height: 1.3;
      }

      .guide-panel {
        padding: 14px;
      }

      .guide-panel h2 {
        font-size: 18px;
      }

      .guide-panel p {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>디지몬 그림 맞추기</h1>
      <div class="stats" aria-live="polite">
        <span class="pill">기록 <strong id="filledCount">0</strong>/24</span>
        <span class="pill">완성 <strong id="pairCount">0</strong>/12</span>
        <button id="openGuide" class="icon-button" type="button" title="설명 보기" aria-label="설명 보기">?</button>
      </div>
    </header>

    <main class="workspace">
      <section class="board-wrap" aria-label="6행 4열 카드 위치">
        <div class="board-toolbar">
          <div class="selected-label">선택 <strong id="selectedLabel">A1</strong></div>
          <div class="actions">
            <button id="clearSelected" type="button">비우기</button>
            <button id="resetBoard" class="danger" type="button">초기화</button>
          </div>
        </div>
        <div id="board" class="board"></div>
      </section>

      <aside class="palette-wrap" aria-label="디지몬 목록">
        <div class="palette-head">
          <p class="palette-title">디지몬</p>
        </div>
        <div id="palette" class="palette"></div>
      </aside>
    </main>

    <footer class="site-footer">
      <div class="visit-line" aria-live="polite">
        <span>오늘방문인원 <strong id="todayVisitCount">-</strong></span>
        <span>/</span>
        <span>토탈방문인원 <strong id="totalVisitCount">-</strong></span>
      </div>
      <div class="source-line">
        이미지 출처 :
        <a href="https://digimon.net/reference_ko/" target="_blank" rel="noopener noreferrer">https://digimon.net/reference_ko/</a>
      </div>
    </footer>
  </div>

  <div id="guideDialog" class="guide-backdrop" hidden>
    <div class="guide-panel" role="dialog" aria-modal="true" aria-labelledby="guideTitle">
      <h2 id="guideTitle">사용 방법</h2>
      <p><strong>A1</strong>부터 자동으로 선택되어 있습니다.</p>
      <p>오른쪽 디지몬을 누르면 현재 칸에 기록되고, 다음 빈 칸으로 자동 이동합니다.</p>
      <p>원하는 위치를 직접 누르면 자유롭게 칸을 바꿀 수 있고, 잘못 넣었을 때는 <strong>비우기</strong> 또는 Delete 키를 쓰면 됩니다.</p>
      <div class="guide-actions">
        <button id="closeGuide" type="button">확인</button>
      </div>
    </div>
  </div>

  <script>
    const imageDir = "assets/digimon/";
    const digimons = [
      ["agumon", "아구몬", "agumon.jpg"],
      ["gabumon", "가브몬", "gabumon.jpg"],
      ["gomamon", "쉬라몬", "gomamon.jpg"],
      ["guilmon", "길몬", "guilmon.jpg"],
      ["hawkmon", "호크몬", "hawkmon.jpg"],
      ["patamon", "파닥몬", "patamon.jpg"],
      ["piyomon", "피요몬", "piyomon.jpg"],
      ["plotmon", "플롯트몬", "plotmon.jpg"],
      ["renamon", "레나몬", "renamon.jpg"],
      ["terriermon", "테리어몬", "terriermon.jpg"],
      ["v-mon", "브이몬", "v-mon.jpg"],
      ["wormmon", "추추몬", "wormmon.jpg"]
    ].map(([id, name, file]) => ({ id, name, src: imageDir + file }));

    const rows = ["A", "B", "C", "D", "E", "F"];
    const columns = 4;
    const state = Array(rows.length * columns).fill(null);
    let selectedIndex = 0;

    const boardEl = document.querySelector("#board");
    const paletteEl = document.querySelector("#palette");
    const selectedLabelEl = document.querySelector("#selectedLabel");
    const filledCountEl = document.querySelector("#filledCount");
    const pairCountEl = document.querySelector("#pairCount");
    const todayVisitCountEl = document.querySelector("#todayVisitCount");
    const totalVisitCountEl = document.querySelector("#totalVisitCount");
    const clearSelectedButton = document.querySelector("#clearSelected");
    const resetButton = document.querySelector("#resetBoard");
    const openGuideButton = document.querySelector("#openGuide");
    const guideDialog = document.querySelector("#guideDialog");
    const closeGuideButton = document.querySelector("#closeGuide");

    function labelFor(index) {
      return `${rows[Math.floor(index / columns)]}${(index % columns) + 1}`;
    }

    function countsById() {
      return state.reduce((counts, id) => {
        if (id) counts[id] = (counts[id] || 0) + 1;
        return counts;
      }, {});
    }

    function nextEmptyIndexAfter(index) {
      for (let offset = 1; offset < state.length; offset += 1) {
        const candidate = (index + offset) % state.length;
        if (!state[candidate]) return candidate;
      }

      return index;
    }

    function focusSelectedCell() {
      requestAnimationFrame(() => {
        boardEl.querySelectorAll(".cell")[selectedIndex]?.focus();
      });
    }

    function renderBoard() {
      boardEl.innerHTML = "";
      const counts = countsById();

      state.forEach((id, index) => {
        const cell = document.createElement("button");
        const digimon = digimons.find((item) => item.id === id);
        cell.type = "button";
        cell.className = [
          "cell",
          selectedIndex === index ? "selected" : "",
          id && counts[id] === 2 ? "matched" : ""
        ].filter(Boolean).join(" ");
        cell.setAttribute("aria-label", `${labelFor(index)} 위치`);
        cell.addEventListener("click", () => {
          selectedIndex = index;
          render();
        });

        const coord = document.createElement("span");
        coord.className = "coord";
        coord.textContent = labelFor(index);
        cell.appendChild(coord);

        if (digimon) {
          const img = document.createElement("img");
          img.src = digimon.src;
          img.alt = digimon.name;
          cell.appendChild(img);
        } else {
          const empty = document.createElement("span");
          empty.className = "empty-mark";
          empty.textContent = "+";
          cell.appendChild(empty);
        }

        boardEl.appendChild(cell);
      });
    }

    function renderPalette() {
      paletteEl.innerHTML = "";
      const counts = countsById();
      const selectedId = state[selectedIndex];

      digimons.forEach((digimon) => {
        const count = counts[digimon.id] || 0;
        const isComplete = count === 2;
        const isDisabled = isComplete && selectedId !== digimon.id;
        const item = document.createElement("button");
        item.type = "button";
        item.className = [
          "digimon",
          isComplete ? "complete" : "",
          isDisabled ? "disabled" : ""
        ].filter(Boolean).join(" ");
        item.disabled = isDisabled;
        item.setAttribute("aria-label", `${digimon.name} ${count}개`);
        item.addEventListener("click", () => {
          const currentIndex = selectedIndex;
          state[currentIndex] = digimon.id;
          selectedIndex = nextEmptyIndexAfter(currentIndex);
          render();
          focusSelectedCell();
        });

        const img = document.createElement("img");
        img.src = digimon.src;
        img.alt = "";
        item.appendChild(img);

        const info = document.createElement("span");
        info.className = "digimon-info";

        const name = document.createElement("span");
        name.className = "name";
        name.textContent = digimon.name;

        const countEl = document.createElement("span");
        countEl.className = "count";
        countEl.textContent = `${count}/2`;

        info.append(name, countEl);
        item.appendChild(info);
        paletteEl.appendChild(item);
      });
    }

    function renderStats() {
      const counts = countsById();
      filledCountEl.textContent = state.filter(Boolean).length;
      pairCountEl.textContent = Object.values(counts).filter((count) => count === 2).length;
      selectedLabelEl.textContent = labelFor(selectedIndex);
      clearSelectedButton.disabled = !state[selectedIndex];
    }

    function render() {
      renderStats();
      renderBoard();
      renderPalette();
    }

    function koreaDateKey() {
      const formatter = new Intl.DateTimeFormat("en", {
        timeZone: "Asia/Seoul",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      });
      const parts = Object.fromEntries(formatter.formatToParts(new Date()).map((part) => [part.type, part.value]));
      return `${parts.year}-${parts.month}-${parts.day}`;
    }

    function storageGet(key) {
      try {
        return localStorage.getItem(key);
      } catch {
        return null;
      }
    }

    function storageSet(key, value) {
      try {
        localStorage.setItem(key, value);
      } catch {
        // Counting still works without localStorage, but refreshes may count again.
      }
    }

    function formatVisitCount(value) {
      return Number.isFinite(value) ? new Intl.NumberFormat("ko-KR").format(value) : "-";
    }

    async function counterRequest(counterName, action = "") {
      const namespace = "integerji-digimon-memory-helper";
      const suffix = action ? `/${action}` : "/";
      const response = await fetch(`https://api.counterapi.dev/v1/${namespace}/${counterName}${suffix}`, {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("Counter request failed");
      }

      const data = await response.json();
      return Number(data.count);
    }

    async function readCounter(counterName) {
      try {
        return await counterRequest(counterName);
      } catch {
        return 0;
      }
    }

    async function updateVisitCounter(counterName, storageKey) {
      if (storageGet(storageKey) === "1") {
        return readCounter(counterName);
      }

      const value = await counterRequest(counterName, "up");
      storageSet(storageKey, "1");
      return value;
    }

    async function initVisitCounter() {
      const todayKey = koreaDateKey();
      const totalStorageKey = "digimon-memory-helper:visited";
      const todayStorageKey = `digimon-memory-helper:visited:${todayKey}`;

      try {
        const total = await updateVisitCounter("total-visitors", totalStorageKey);
        const today = await updateVisitCounter(`today-visitors-${todayKey}`, todayStorageKey);
        totalVisitCountEl.textContent = formatVisitCount(total);
        todayVisitCountEl.textContent = formatVisitCount(today);
      } catch {
        totalVisitCountEl.textContent = "-";
        todayVisitCountEl.textContent = "-";
      }
    }

    function showGuide() {
      guideDialog.hidden = false;
      closeGuideButton.focus();
    }

    function hideGuide() {
      guideDialog.hidden = true;
      storageSet("digimon-memory-helper:guide-seen", "1");
      focusSelectedCell();
    }

    function initGuide() {
      if (storageGet("digimon-memory-helper:guide-seen") !== "1") {
        showGuide();
      } else {
        focusSelectedCell();
      }
    }

    clearSelectedButton.addEventListener("click", () => {
      state[selectedIndex] = null;
      render();
    });

    resetButton.addEventListener("click", () => {
      state.fill(null);
      selectedIndex = 0;
      render();
      focusSelectedCell();
    });

    openGuideButton.addEventListener("click", showGuide);

    closeGuideButton.addEventListener("click", hideGuide);

    guideDialog.addEventListener("click", (event) => {
      if (event.target === guideDialog) {
        hideGuide();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (!guideDialog.hidden) {
        if (event.key === "Escape") {
          hideGuide();
        }
        return;
      }

      const row = rows.indexOf(event.key.toUpperCase());
      if (row >= 0) {
        selectedIndex = row * columns + (selectedIndex % columns);
        render();
        focusSelectedCell();
      }

      const number = Number(event.key);
      if (number >= 1 && number <= columns) {
        selectedIndex = Math.floor(selectedIndex / columns) * columns + number - 1;
        render();
        focusSelectedCell();
      }

      if (event.key === "Backspace" || event.key === "Delete") {
        state[selectedIndex] = null;
        render();
        focusSelectedCell();
      }
    });

    render();
    initVisitCounter();
    initGuide();
  </script>
</body>
</html>
